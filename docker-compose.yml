version: "3.9"

services:

  siteworks:

    image: nginx:alpine

    container_name: siteworks-site

    restart: unless-stopped

    volumes:

      - ./site:/usr/share/nginx/html:ro

      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

    networks:

      - proxy

networks:

  proxy:

    external: true